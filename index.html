<!DOCTYPE html>

<!-- ScaleMatch v2.4 | 2025-04-26 | Fix: fullscreen exit button visibility on Safari/iPad -->

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScaleMatch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #0c0e12;
    --surface: #13151c;
    --surface2: #1a1d27;
    --border: #22252f;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --text: #e8eaf0;
    --muted: #4b5060;
    --panel-h: 56px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
overflow: hidden;
-webkit-tap-highlight-color: transparent;
user-select: none;
-webkit-user-select: none;
}

#app {
display: flex;
flex-direction: column;
height: 100dvh;
padding-top: var(–safe-top);
padding-bottom: var(–safe-bottom);
padding-left: var(–safe-left);
padding-right: var(–safe-right);
}

/* ── TOPBAR ── */
#topbar {
flex-shrink: 0;
height: var(–panel-h);
background: var(–surface);
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
padding: 0 10px;
gap: 8px;
z-index: 1000;
}

#wordmark {
font-size: 13px;
font-weight: 700;
letter-spacing: 0.1em;
color: var(–accent);
white-space: nowrap;
flex-shrink: 0;
text-transform: uppercase;
}

#wordmark span { color: var(–accent2); }

.topbar-gap { flex: 1; }

#zoom-badge {
font-size: 11px;
font-weight: 600;
letter-spacing: 0.05em;
color: #8891a8;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 4px;
padding: 3px 7px;
white-space: nowrap;
flex-shrink: 0;
min-width: 52px;
text-align: center;
}

/* toolbar icon buttons */
.tb-btn {
flex-shrink: 0;
width: 52px;
height: 44px;
border: 1px solid var(–border);
border-radius: 8px;
background: var(–bg);
color: #8891a8;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 2px;
font-size: 16px;
transition: color 0.15s, border-color 0.15s, background 0.15s;
-webkit-tap-highlight-color: transparent;
}

.tb-btn .tb-label {
font-size: 8px;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
line-height: 1;
color: inherit;
}

.tb-btn:active { opacity: 0.7; }
.tb-btn.active { color: var(–accent); border-color: var(–accent); background: rgba(74,222,128,0.08); }
.tb-btn.active2 { color: var(–accent2); border-color: var(–accent2); background: rgba(96,165,250,0.08); }

/* ── RING PANEL (collapsible) ── */
#ring-panel {
flex-shrink: 0;
overflow: hidden;
max-height: 0;
transition: max-height 0.25s ease, border-bottom 0.25s;
background: var(–surface);
border-bottom: 0px solid var(–border);
}

#ring-panel.open {
max-height: 52px;
border-bottom: 1px solid var(–border);
}

#ring-inner {
height: 52px;
display: flex;
align-items: center;
padding: 0 12px;
gap: 10px;
}

#ring-inner label {
font-size: 11px;
font-weight: 600;
letter-spacing: 0.08em;
color: var(–muted);
text-transform: uppercase;
flex-shrink: 0;
}

#ring-radius {
flex: 1;
max-width: 180px;
height: 4px;
-webkit-appearance: none;
appearance: none;
background: var(–border);
border-radius: 2px;
outline: none;
cursor: pointer;
}

#ring-radius::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px;
height: 18px;
border-radius: 50%;
background: var(–accent);
cursor: pointer;
border: 2px solid var(–bg);
}

#ring-val {
font-size: 12px;
font-weight: 600;
color: var(–text);
min-width: 52px;
text-align: right;
flex-shrink: 0;
}

.ring-unit-btn {
flex-shrink: 0;
height: 28px;
padding: 0 10px;
border: 1px solid var(–accent);
border-radius: 5px;
background: none;
color: var(–accent);
font-size: 11px;
font-weight: 700;
letter-spacing: 0.06em;
cursor: pointer;
text-transform: uppercase;
transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.ring-unit-btn:hover { background: rgba(74,222,128,0.08); }

.ring-clear-btn {
flex-shrink: 0;
height: 28px;
padding: 0 10px;
border: 1px solid var(–border);
border-radius: 5px;
background: none;
color: var(–muted);
font-size: 11px;
font-weight: 600;
letter-spacing: 0.06em;
cursor: pointer;
text-transform: uppercase;
transition: color 0.15s, border-color 0.15s;
}

.ring-clear-btn:hover { color: var(–text); border-color: var(–muted); }

/* ── TILE/STYLE PANEL (collapsible) ── */
#style-panel {
flex-shrink: 0;
overflow: hidden;
max-height: 0;
transition: max-height 0.25s ease, border-bottom 0.25s;
background: var(–surface);
border-bottom: 0px solid var(–border);
}

#style-panel.open {
max-height: 52px;
border-bottom: 1px solid var(–border);
}

#style-inner {
height: 52px;
display: flex;
align-items: center;
padding: 0 12px;
gap: 6px;
}

.style-opt {
height: 30px;
padding: 0 12px;
border: 1px solid var(–border);
border-radius: 5px;
background: none;
color: var(–muted);
font-size: 11px;
font-weight: 600;
letter-spacing: 0.07em;
cursor: pointer;
text-transform: uppercase;
transition: color 0.15s, border-color 0.15s, background 0.15s;
white-space: nowrap;
}

.style-opt.active {
color: var(–accent2);
border-color: var(–accent2);
background: rgba(96,165,250,0.08);
}

/* ── PINS PANEL (collapsible) ── */
#pins-panel {
flex-shrink: 0;
overflow: hidden;
max-height: 0;
transition: max-height 0.3s ease, border-bottom 0.3s;
background: var(–surface);
border-bottom: 0px solid var(–border);
}

#pins-panel.open {
max-height: 58px;
border-bottom: 1px solid var(–border);
}

#pins-inner {
height: 58px;
display: flex;
align-items: center;
padding: 0 10px;
gap: 6px;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}

#pins-inner::-webkit-scrollbar { display: none; }

.pin-chip {
flex-shrink: 0;
height: 32px;
padding: 0 10px;
border: 1px solid var(–border);
border-radius: 16px;
background: var(–bg);
color: var(–text);
font-size: 11px;
font-weight: 500;
cursor: pointer;
display: flex;
align-items: center;
gap: 5px;
white-space: nowrap;
transition: border-color 0.15s;
max-width: 140px;
}

.pin-chip:hover { border-color: var(–muted); }

.pin-chip .pin-dot {
width: 6px;
height: 6px;
border-radius: 50%;
flex-shrink: 0;
}

.pin-chip .pin-label {
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

.pin-chip .pin-del {
flex-shrink: 0;
color: var(–muted);
font-size: 13px;
line-height: 1;
margin-left: 2px;
}

.pin-add-btn {
flex-shrink: 0;
height: 32px;
padding: 0 10px;
border: 1px dashed var(–border);
border-radius: 16px;
background: none;
color: var(–muted);
font-size: 11px;
font-weight: 600;
letter-spacing: 0.06em;
cursor: pointer;
white-space: nowrap;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 4px;
}

/* ── MAPS CONTAINER ── */
#maps-container {
flex: 1;
display: flex;
min-height: 0;
position: relative;
}

@media (orientation: landscape) {
#maps-container { flex-direction: row; }
.divider { width: 1px; height: 100%; }
}

@media (orientation: portrait) {
#maps-container { flex-direction: column; }
.divider { width: 100%; height: 1px; }
}

.divider {
background: var(–border);
flex-shrink: 0;
z-index: 10;
}

.map-panel {
flex: 1;
display: flex;
flex-direction: column;
min-width: 0;
min-height: 0;
position: relative;
}

/* ── SEARCH BAR per panel ── */
.search-bar {
flex-shrink: 0;
height: 40px;
background: var(–surface);
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
padding: 0 8px;
gap: 6px;
z-index: 900;
position: relative;
}

.panel-label {
font-size: 9px;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
flex-shrink: 0;
width: 38px;
}

#panel-home .panel-label { color: var(–accent); }
#panel-target .panel-label { color: var(–accent2); }

.search-input {
flex: 1;
height: 28px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 5px;
color: var(–text);
font-size: 12px;
padding: 0 9px;
outline: none;
min-width: 0;
transition: border-color 0.15s;
user-select: text;
-webkit-user-select: text;
}

.search-input::placeholder { color: var(–muted); }
.search-input:focus { border-color: var(–accent); }
#panel-target .search-input:focus { border-color: var(–accent2); }

.search-btn {
flex-shrink: 0;
width: 32px;
height: 28px;
border: none;
border-radius: 5px;
cursor: pointer;
font-size: 13px;
display: flex;
align-items: center;
justify-content: center;
transition: opacity 0.15s;
}

.search-btn:active { opacity: 0.7; }
#panel-home .search-btn { background: var(–accent); color: #0c0e12; }
#panel-target .search-btn { background: var(–accent2); color: #0c0e12; }

/* pin-this button in search bar */
.pin-this-btn {
flex-shrink: 0;
width: 28px;
height: 28px;
border: 1px solid var(–border);
border-radius: 5px;
background: none;
color: var(–muted);
cursor: pointer;
font-size: 13px;
display: flex;
align-items: center;
justify-content: center;
transition: color 0.15s, border-color 0.15s;
}

.pin-this-btn:active { opacity: 0.7; }
.pin-this-btn.pinned { color: var(–accent); border-color: var(–accent); }

/* ── AUTOCOMPLETE ── */
.autocomplete-list {
position: absolute;
top: 40px;
left: 0; right: 0;
background: var(–surface);
border: 1px solid var(–border);
border-top: none;
z-index: 2000;
max-height: 200px;
overflow-y: auto;
display: none;
box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}

.autocomplete-list.open { display: block; }

.ac-item {
padding: 10px 12px;
font-size: 12px;
color: var(–text);
cursor: pointer;
border-bottom: 1px solid var(–border);
min-height: 44px;
display: flex;
align-items: center;
line-height: 1.3;
}

.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item:active { background: var(–bg); }

/* ── MAP ── */
.map-view {
flex: 1;
min-height: 0;
z-index: 1;
}

/* ── SCALE LABEL ── */
.scale-label {
position: absolute;
bottom: 28px;
left: 8px;
background: rgba(12,14,18,0.88);
border: 1px solid #8891a8;
border-radius: 4px;
padding: 3px 8px;
font-size: 11px;
font-weight: 700;
letter-spacing: 0.05em;
color: #ffffff;
pointer-events: none;
z-index: 500;
backdrop-filter: blur(4px);
}

/* ── STATUS TOAST ── */
.map-status {
position: absolute;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
background: rgba(12,14,18,0.88);
border: 1px solid var(–border);
border-radius: 20px;
padding: 4px 12px;
font-size: 11px;
color: var(–muted);
pointer-events: none;
z-index: 500;
white-space: nowrap;
opacity: 0;
transition: opacity 0.3s;
}

.map-status.show { opacity: 1; }

/* ── FULLSCREEN ── */
#app.fullscreen #topbar,
#app.fullscreen #ring-panel,
#app.fullscreen #style-panel,
#app.fullscreen #pins-panel,
#app.fullscreen .search-bar {
display: none !important;
}

#app.fullscreen #maps-container {
height: 100dvh;
position: fixed;
inset: 0;
z-index: 9999;
}

#fs-exit {
display: none;
position: fixed;
top: calc(var(–safe-top) + 12px);
right: calc(var(–safe-right) + 12px);
z-index: 10000;
width: 52px;
height: 44px;
background: rgba(12,14,18,0.92);
border: 1px solid #8891a8;
border-radius: 8px;
color: #e8eaf0;
font-size: 15px;
cursor: pointer;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 2px;
backdrop-filter: blur(8px);
}

#fs-exit .tb-label {
font-size: 8px;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
color: inherit;
}

#app.fullscreen ~ #fs-exit,
#fs-exit { display: none; }
#app.fullscreen #fs-exit { display: flex !important; }

/* Leaflet overrides */
.leaflet-control-zoom {
border: 1px solid var(–border) !important;
border-radius: 6px !important;
box-shadow: none !important;
}
.leaflet-control-zoom a {
background: var(–surface) !important;
color: var(–text) !important;
border-color: var(–border) !important;
width: 30px !important;
height: 30px !important;
line-height: 30px !important;
font-size: 15px !important;
}
.leaflet-control-zoom a:hover { background: var(–bg) !important; }
.leaflet-control-attribution { display: none !important; }
.leaflet-bar { border: none !important; box-shadow: none !important; }
</style>

</head>

<script>
// ─────────────────────────────────────────
// TILE CONFIGS
// ─────────────────────────────────────────
const TILES = {
  voyager: {
    url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    sub: 'abcd'
  },
  positron: {
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    sub: 'abcd'
  },
  satellite: {
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    sub: ''
  },
  terrain: {
    url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    sub: 'abc'
  }
};

let currentStyle = 'voyager';
let syncLock = false;
let panSyncLock = false;
let panSyncActive = false; // OFF by default
let sharedZoom = 6;
let tileLayerHome, tileLayerTarget;
let ringHome = null, ringTarget = null;
let ringActive = false;

// ─────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────
const mapHome = L.map('map-home', {
  center: [51.5, -0.12],
  zoom: sharedZoom,
  zoomControl: true,
  attributionControl: false
});

const mapTarget = L.map('map-target', {
  center: [40.71, -74.01],
  zoom: sharedZoom,
  zoomControl: true,
  attributionControl: false
});

function makeTileLayer(style) {
  const t = TILES[style];
  const opts = { maxZoom: 19 };
  if (t.sub) opts.subdomains = t.sub;
  return L.tileLayer(t.url, opts);
}

tileLayerHome = makeTileLayer(currentStyle).addTo(mapHome);
tileLayerTarget = makeTileLayer(currentStyle).addTo(mapTarget);

// ─────────────────────────────────────────
// ZOOM SYNC
// ─────────────────────────────────────────
function zoomToScale(z) {
  const scales = {
    1:'1:500M',2:'1:250M',3:'1:150M',4:'1:70M',5:'1:35M',
    6:'1:15M',7:'1:8M',8:'1:4M',9:'1:2M',10:'1:1M',
    11:'1:500k',12:'1:250k',13:'1:150k',14:'1:70k',15:'1:35k',
    16:'1:15k',17:'1:8k',18:'1:4k',19:'1:2k'
  };
  return scales[z] || `Z${z}`;
}

function updateZoomBadge(z) {
  document.getElementById('zoom-badge').textContent = `Z: ${z}`;
  document.getElementById('home-scale').textContent = zoomToScale(z);
  document.getElementById('target-scale').textContent = zoomToScale(z);
}

mapHome.on('zoomend', () => {
  if (syncLock) return;
  syncLock = true;
  const z = mapHome.getZoom();
  sharedZoom = z;
  mapTarget.setZoom(z);
  updateZoomBadge(z);
  updateRings();
  syncLock = false;
});

mapTarget.on('zoomend', () => {
  if (syncLock) return;
  syncLock = true;
  const z = mapTarget.getZoom();
  sharedZoom = z;
  mapHome.setZoom(z);
  updateZoomBadge(z);
  updateRings();
  syncLock = false;
});

updateZoomBadge(sharedZoom);

// ─────────────────────────────────────────
// PAN SYNC
// ─────────────────────────────────────────
// Store offsets so each map has its own centre but panning is relative
let homeCenter = null;
let targetCenter = null;

function onMapMove(sourceMap, otherMap) {
  return function() {
    if (!panSyncActive) return;
    if (panSyncLock) return;
    panSyncLock = true;

    const sourceNew = sourceMap.getCenter();

    if (sourceMap === mapHome) {
      const latDelta = sourceNew.lat - (homeCenter ? homeCenter.lat : sourceNew.lat);
      const lngDelta = sourceNew.lng - (homeCenter ? homeCenter.lng : sourceNew.lng);
      homeCenter = sourceNew;
      if (targetCenter) {
        const newTarget = L.latLng(targetCenter.lat + latDelta, targetCenter.lng + lngDelta);
        targetCenter = newTarget;
        otherMap.setView(newTarget, sharedZoom, { animate: false });
      } else {
        targetCenter = otherMap.getCenter();
      }
    } else {
      const latDelta = sourceNew.lat - (targetCenter ? targetCenter.lat : sourceNew.lat);
      const lngDelta = sourceNew.lng - (targetCenter ? targetCenter.lng : sourceNew.lng);
      targetCenter = sourceNew;
      if (homeCenter) {
        const newHome = L.latLng(homeCenter.lat + latDelta, homeCenter.lng + lngDelta);
        homeCenter = newHome;
        otherMap.setView(newHome, sharedZoom, { animate: false });
      } else {
        homeCenter = otherMap.getCenter();
      }
    }

    panSyncLock = false;
  };
}

mapHome.on('move', onMapMove(mapHome, mapTarget));
mapTarget.on('move', onMapMove(mapTarget, mapHome));

// Seed centers after initial load
mapHome.whenReady(() => { homeCenter = mapHome.getCenter(); });
mapTarget.whenReady(() => { targetCenter = mapTarget.getCenter(); });

// ─────────────────────────────────────────
// DISTANCE RINGS
// ─────────────────────────────────────────
let ringUnit = 'km'; // 'km' or 'mi'
const KM_PER_MI = 1.60934;

function ringRadiusMeters() {
  const val = parseInt(ringSlider.value);
  return ringUnit === 'mi' ? val * KM_PER_MI * 1000 : val * 1000;
}

function formatRingVal(val) {
  return `${val} ${ringUnit}`;
}

function drawRings() {
  if (!ringActive) return;

  const hc = mapHome.getCenter();
  const tc = mapTarget.getCenter();
  const r = ringRadiusMeters();

  const styleHome = {
    color: '#4ade80', weight: 1.5,
    fillColor: '#4ade80', fillOpacity: 0.06,
    dashArray: '6 4', interactive: false
  };
  const styleTarget = {
    color: '#60a5fa', weight: 1.5,
    fillColor: '#60a5fa', fillOpacity: 0.06,
    dashArray: '6 4', interactive: false
  };

  // Always remove and recreate to guarantee correct position
  if (ringHome) { ringHome.remove(); ringHome = null; }
  if (ringTarget) { ringTarget.remove(); ringTarget = null; }

  ringHome = L.circle(hc, { radius: r, ...styleHome }).addTo(mapHome);
  ringTarget = L.circle(tc, { radius: r, ...styleTarget }).addTo(mapTarget);
}

function clearRings() {
  if (ringHome) { ringHome.remove(); ringHome = null; }
  if (ringTarget) { ringTarget.remove(); ringTarget = null; }
}

function updateRings() {
  if (ringActive) drawRings();
}

// Redraw rings on moveend only (not move — avoids flicker and style-change spurious events)
mapHome.on('moveend', () => { if (ringActive) drawRings(); });
mapTarget.on('moveend', () => { if (ringActive) drawRings(); });

// Ring controls
const ringSlider = document.getElementById('ring-radius');
const ringVal = document.getElementById('ring-val');
const ringUnitBtn = document.getElementById('ring-unit');

ringSlider.addEventListener('input', () => {
  ringVal.textContent = formatRingVal(ringSlider.value);
  if (ringActive) drawRings();
});

ringUnitBtn.addEventListener('click', () => {
  const currentVal = parseInt(ringSlider.value);
  if (ringUnit === 'km') {
    ringUnit = 'mi';
    ringUnitBtn.textContent = 'km';
    // Convert slider value km→mi
    const inMi = Math.round(currentVal / KM_PER_MI);
    ringSlider.value = Math.max(1, inMi);
  } else {
    ringUnit = 'km';
    ringUnitBtn.textContent = 'mi';
    // Convert slider value mi→km
    const inKm = Math.round(currentVal * KM_PER_MI);
    ringSlider.value = Math.min(500, inKm);
  }
  ringVal.textContent = formatRingVal(ringSlider.value);
  if (ringActive) drawRings();
});

document.getElementById('ring-clear').addEventListener('click', () => {
  clearRings();
  ringActive = false;
  document.getElementById('btn-ring').classList.remove('active');
  togglePanel('ring-panel', false);
});

// ─────────────────────────────────────────
// STYLE SWITCHER
// ─────────────────────────────────────────
document.querySelectorAll('.style-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    const style = btn.dataset.style;
    if (style === currentStyle) return;
    currentStyle = style;

    document.querySelectorAll('.style-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    tileLayerHome.remove();
    tileLayerTarget.remove();
    tileLayerHome = makeTileLayer(style).addTo(mapHome);
    tileLayerTarget = makeTileLayer(style).addTo(mapTarget);
    // Redraw rings on top of new tiles
    if (ringActive) drawRings();
  });
});

// ─────────────────────────────────────────
// PANEL TOGGLES
// ─────────────────────────────────────────
const panels = { ring: 'ring-panel', style: 'style-panel', pins: 'pins-panel' };

function togglePanel(panelId, forceState) {
  const el = document.getElementById(panelId);
  const isOpen = el.classList.contains('open');
  const shouldOpen = forceState !== undefined ? forceState : !isOpen;

  // Close others
  Object.values(panels).forEach(id => {
    if (id !== panelId) document.getElementById(id).classList.remove('open');
  });

  el.classList.toggle('open', shouldOpen);
}

document.getElementById('btn-pan').addEventListener('click', () => {
  panSyncActive = !panSyncActive;
  document.getElementById('btn-pan').classList.toggle('active', panSyncActive);
  if (panSyncActive) {
    homeCenter = mapHome.getCenter();
    targetCenter = mapTarget.getCenter();
  }
});

document.getElementById('btn-ring').addEventListener('click', () => {
  ringActive = !ringActive;
  document.getElementById('btn-ring').classList.toggle('active', ringActive);
  togglePanel('ring-panel', ringActive);
  if (ringActive) drawRings(); else clearRings();
});

document.getElementById('btn-style').addEventListener('click', () => {
  const isOpen = document.getElementById('style-panel').classList.contains('open');
  document.getElementById('btn-style').classList.toggle('active', !isOpen);
  togglePanel('style-panel');
});

document.getElementById('btn-pins').addEventListener('click', () => {
  const isOpen = document.getElementById('pins-panel').classList.contains('open');
  document.getElementById('btn-pins').classList.toggle('active', !isOpen);
  togglePanel('pins-panel');
  renderPins();
});

// ─────────────────────────────────────────
// FULLSCREEN
// ─────────────────────────────────────────
const app = document.getElementById('app');
const fsExit = document.getElementById('fs-exit');
const btnFS = document.getElementById('btn-fs');

function enterFullscreen() {
  app.classList.add('fullscreen');
  fsExit.style.display = 'flex';
  btnFS.classList.add('active');
  setTimeout(() => {
    mapHome.invalidateSize();
    mapTarget.invalidateSize();
  }, 50);
}

function exitFullscreen() {
  app.classList.remove('fullscreen');
  fsExit.style.display = 'none';
  btnFS.classList.remove('active');
  setTimeout(() => {
    mapHome.invalidateSize();
    mapTarget.invalidateSize();
  }, 50);
}

btnFS.addEventListener('click', () => {
  if (app.classList.contains('fullscreen')) exitFullscreen();
  else enterFullscreen();
});

fsExit.addEventListener('click', exitFullscreen);

// Native fullscreen API on desktop
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && app.classList.contains('fullscreen')) {
    exitFullscreen();
  }
});

// ─────────────────────────────────────────
// PINS
// ─────────────────────────────────────────
let pins = JSON.parse(localStorage.getItem('sm_pins') || '[]');

function savePins() {
  try { localStorage.setItem('sm_pins', JSON.stringify(pins)); } catch(e) {}
}

function renderPins() {
  const list = document.getElementById('pins-list');
  list.innerHTML = '';

  if (!pins.length) {
    const empty = document.createElement('span');
    empty.style.cssText = 'font-size:11px;color:var(--muted);padding:0 6px;white-space:nowrap;';
    empty.textContent = 'No saved locations';
    list.appendChild(empty);
    return;
  }

  pins.forEach((pin, i) => {
    const chip = document.createElement('div');
    chip.className = 'pin-chip';
    chip.innerHTML = `
      <span class="pin-dot" style="background:${pin.panel === 'home' ? 'var(--accent)' : 'var(--accent2)'}"></span>
      <span class="pin-label">${pin.label}</span>
      <span class="pin-del">×</span>
    `;
    // Click to navigate
    chip.addEventListener('click', (e) => {
      if (e.target.classList.contains('pin-del')) {
        pins.splice(i, 1);
        savePins();
        renderPins();
        return;
      }
      const targetMap = pin.panel === 'home' ? mapHome : mapTarget;
      targetMap.setView([pin.lat, pin.lng], sharedZoom);
      if (pin.panel === 'home') {
        homeCenter = L.latLng(pin.lat, pin.lng);
        document.getElementById('home-input').value = pin.label;
      } else {
        targetCenter = L.latLng(pin.lat, pin.lng);
        document.getElementById('target-input').value = pin.label;
      }
    });
    list.appendChild(chip);
  });
}

function pinCurrentLocation(panelId) {
  const map = panelId === 'home' ? mapHome : mapTarget;
  const input = document.getElementById(panelId + '-input');
  const label = (input.value || 'Location').split(',')[0].trim().slice(0, 28);
  const center = map.getCenter();

  pins.push({ label, lat: center.lat, lng: center.lng, panel: panelId });
  savePins();
  renderPins();

  const btn = document.getElementById(panelId + '-pin-btn');
  btn.classList.add('pinned');
  setTimeout(() => btn.classList.remove('pinned'), 1500);
}

document.getElementById('home-pin-btn').addEventListener('click', () => pinCurrentLocation('home'));
document.getElementById('target-pin-btn').addEventListener('click', () => pinCurrentLocation('target'));

renderPins();

// ─────────────────────────────────────────
// GEOCODER
// ─────────────────────────────────────────
async function photonSearch(q) {
  const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5&lang=en`;
  const r = await fetch(url);
  const data = await r.json();
  return data.features.map(f => ({
    lat: f.geometry.coordinates[1],
    lon: f.geometry.coordinates[0],
    display_name: [
      f.properties.name,
      f.properties.city || f.properties.county,
      f.properties.state,
      f.properties.country
    ].filter(Boolean).join(', ')
  }));
}

let debounceTimers = {};

function setupSearch(inputId, btnId, acId, mapObj, statusId, panelKey) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  const ac = document.getElementById(acId);
  const status = document.getElementById(statusId);
  let results = [];

  function showStatus(msg) {
    status.textContent = msg;
    status.classList.add('show');
    clearTimeout(status._t);
    status._t = setTimeout(() => status.classList.remove('show'), 2000);
  }

  function closeAC() {
    ac.innerHTML = '';
    ac.classList.remove('open');
  }

  function flyTo(item) {
    const lat = parseFloat(item.lat);
    const lon = parseFloat(item.lon);
    const center = L.latLng(lat, lon);
    mapObj.setView(center, sharedZoom);
    // Update tracked center
    if (panelKey === 'home') homeCenter = center;
    else targetCenter = center;
    input.value = item.display_name.split(',').slice(0, 3).join(', ');
    closeAC();
    if (ringActive) drawRings();
  }

  async function doSearch(q) {
    if (!q.trim()) return;
    showStatus('Searching…');
    try {
      results = await photonSearch(q);
      if (!results.length) { showStatus('No results'); return; }
      if (results.length === 1) { flyTo(results[0]); return; }
      ac.innerHTML = '';
      results.forEach((item) => {
        const el = document.createElement('div');
        el.className = 'ac-item';
        el.textContent = item.display_name.split(',').slice(0, 4).join(', ');
        el.addEventListener('click', () => flyTo(item));
        ac.appendChild(el);
      });
      ac.classList.add('open');
      status.classList.remove('show');
    } catch(e) {
      showStatus('Error — check connection');
    }
  }

  input.addEventListener('input', () => {
    clearTimeout(debounceTimers[inputId]);
    const q = input.value;
    if (q.length < 3) { closeAC(); return; }
    debounceTimers[inputId] = setTimeout(() => doSearch(q), 500);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { clearTimeout(debounceTimers[inputId]); closeAC(); doSearch(input.value); }
    if (e.key === 'Escape') closeAC();
  });

  btn.addEventListener('click', () => { closeAC(); doSearch(input.value); });

  document.addEventListener('click', e => {
    if (!ac.contains(e.target) && e.target !== input) closeAC();
  });
}

setupSearch('home-input',   'home-btn',   'home-ac',   mapHome,   'home-status',   'home');
setupSearch('target-input', 'target-btn', 'target-ac', mapTarget, 'target-status', 'target');

// ─────────────────────────────────────────
// RESIZE HANDLER
// ─────────────────────────────────────────
window.addEventListener('resize', () => {
  setTimeout(() => {
    mapHome.invalidateSize();
    mapTarget.invalidateSize();
  }, 150);
});
</script>
