<style>
  :root {
    --bg:        #f8f8f8;
    --surface:   #ffffff;
    --surface2:  #f0f0f0;
    --border:    #e0e0e0;
    --border2:   #cccccc;
    --accent:    #1a9e6e;
    --accent2:   #1a6eb5;
    --text:      #1a1a2e;
    --muted:     #888899;
    --bright:    #555566;
    --panel-h:   58px;
    --safe-top:    env(safe-area-inset-top,    0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left,   0px);
    --safe-right:  env(safe-area-inset-right,  0px);
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
background: var(--bg);
color: var(--text);
font-family: 'DM Mono', monospace;
overflow: hidden;
-webkit-tap-highlight-color: transparent;
user-select: none;
-webkit-user-select: none;
}

#app {
display: flex;
flex-direction: column;
height: 100dvh;
padding-top:    var(--safe-top);
padding-bottom: var(--safe-bottom);
padding-left:   var(--safe-left);
padding-right:  var(--safe-right);
}

#topbar {
flex-shrink: 0;
height: var(--panel-h);
background: var(--surface);
border-bottom: 1px solid var(--border);
display: flex;
align-items: center;
padding: 0 10px;
gap: 7px;
z-index: 1000;
}

#wordmark { display: flex; flex-direction: column; flex-shrink: 0; gap: 1px; }

#wordmark-title {
font-family: 'Syne', sans-serif;
font-size: 14px;
font-weight: 800;
letter-spacing: 0.04em;
color: var(--accent);
line-height: 1;
text-transform: uppercase;
}

#wordmark-title .t2 { color: var(--accent2); }

#wordmark-title .ver {
color: var(--muted);
font-family: 'DM Mono', monospace;
font-size: 9px;
font-weight: 400;
letter-spacing: 0.06em;
margin-left: 4px;
}

#wordmark-sub {
font-size: 8px;
font-weight: 500;
letter-spacing: 0.1em;
color: var(--muted);

}

.topbar-gap { flex: 1; }

#zoom-badge {
font-size: 11px;
font-weight: 500;

#globe-badge {

<script>

// ── TILE STYLES ──────────────────────────
const STYLES = {
  voyager: {
    version: 8,
    sources: { carto: {
      type: 'raster',
      tiles: [
        'https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
        'https://b.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'
      ],
      tileSize: 256, maxzoom: 19
    }},
    layers: [{ id: 'bg', type: 'raster', source: 'carto' }]
  },
  positron: {
    version: 8,
    sources: { carto: {
      type: 'raster',
      tiles: [
        'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
        'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
      ],
      tileSize: 256, maxzoom: 19
    }},
    layers: [{ id: 'bg', type: 'raster', source: 'carto' }]
  },
  satellite: {
    version: 8,
    sources: { esri: {
      type: 'raster',
      tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
      tileSize: 256, maxzoom: 19
    }},
    layers: [{ id: 'bg', type: 'raster', source: 'esri' }]
  },
  terrain: {
    version: 8,
    sources: { otm: {
      type: 'raster',
      tiles: [
        'https://a.tile.opentopomap.org/{z}/{x}/{y}.png',
        'https://b.tile.opentopomap.org/{z}/{x}/{y}.png'
      ],
      tileSize: 256, maxzoom: 17
    }},
    layers: [{ id: 'bg', type: 'raster', source: 'otm' }]
  }
};

// ── STATE ────────────────────────────────
let currentStyle  = 'voyager';
let nominalZoom   = 4;
let syncLock      = false;
let panSyncActive = false;
let panLock       = false;
let homePanBase   = null;
let targetPanBase = null;

function makeStyle(name) {
  return JSON.parse(JSON.stringify(STYLES[name]));
}

// ── MAP INIT ─────────────────────────────
const mapHome = new maplibregl.Map({
  container: 'map-home',
  style: makeStyle('voyager'),
  center: [-0.12, 51.5],
  zoom: nominalZoom,
  attributionControl: false
});

const mapTarget = new maplibregl.Map({
  container: 'map-target',
  style: makeStyle('voyager'),
  center: [-74.01, 40.71],
  zoom: nominalZoom,
  attributionControl: false
});

mapHome.on('style.load', function() {
  mapHome.setProjection({ type: 'globe' });
});

mapTarget.on('style.load', function() {
  mapTarget.setProjection({ type: 'globe' });
});

mapHome.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-left');
mapTarget.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-left');

// ── SCALE MATCHING (true ground scale, not zoom number) ──
// Measures each panel's actual on-screen metres-per-pixel and slaves the
// other panel's zoom to match it. Robust to how the globe projection maps
// zoom -> scale, because it reads what is really rendered rather than
// assuming a cos(latitude) formula.
function metresPerPixel(map) {
  var c = map.getCenter();
  var p = map.project(c);
  var a = map.unproject([p.x - 32, p.y]);
  var b = map.unproject([p.x + 32, p.y]);
  return a.distanceTo(b) / 64;   // metres per screen pixel at the centre
}

function matchScale(srcMap, dstMap) {
  var srcMpp = metresPerPixel(srcMap);
  var dstMpp = metresPerPixel(dstMap);
  if (!isFinite(srcMpp) || !isFinite(dstMpp) || srcMpp <= 0 || dstMpp <= 0) return;
  // dst mpp scales as 1 / 2^zoom at a fixed centre, so this is exact in one step
  var nz = dstMap.getZoom() + Math.log2(dstMpp / srcMpp);
  nz = Math.max(dstMap.getMinZoom(), Math.min(dstMap.getMaxZoom(), nz));
  dstMap.setZoom(nz);
}

// ── ZOOM SYNC ────────────────────────────
mapHome.on('zoom', function() {
  if (syncLock) return;
  syncLock = true;
  matchScale(mapHome, mapTarget);
  nominalZoom = mapHome.getZoom();
  syncLock = false;
  updateUI();
});

mapTarget.on('zoom', function() {
  if (syncLock) return;
  syncLock = true;
  matchScale(mapTarget, mapHome);
  nominalZoom = mapHome.getZoom();
  syncLock = false;
  updateUI();
});

// ── PAN SYNC ─────────────────────────────
mapHome.on('move', function() {
  if (!panSyncActive || panLock) return;
  panLock = true;
  var c = mapHome.getCenter();
  var dlng = c.lng - (homePanBase ? homePanBase.lng : c.lng);
  var dlat = c.lat - (homePanBase ? homePanBase.lat : c.lat);
  homePanBase = { lat: c.lat, lng: c.lng };
  if (targetPanBase) {
    var nt = { lng: targetPanBase.lng + dlng, lat: Math.max(-85, Math.min(85, targetPanBase.lat + dlat)) };
    targetPanBase = nt;
    mapTarget.setCenter(nt);
  } else {
    var tc = mapTarget.getCenter();
    targetPanBase = { lat: tc.lat, lng: tc.lng };
  }
  panLock = false;
});

mapTarget.on('move', function() {
  if (!panSyncActive || panLock) return;
  panLock = true;
  var c = mapTarget.getCenter();
  var dlng = c.lng - (targetPanBase ? targetPanBase.lng : c.lng);
  var dlat = c.lat - (targetPanBase ? targetPanBase.lat : c.lat);
  targetPanBase = { lat: c.lat, lng: c.lng };
  if (homePanBase) {
    var nh = { lng: homePanBase.lng + dlng, lat: Math.max(-85, Math.min(85, homePanBase.lat + dlat)) };
    homePanBase = nh;
    mapHome.setCenter(nh);
  } else {
    var hc = mapHome.getCenter();
    homePanBase = { lat: hc.lat, lng: hc.lng };
  }
  panLock = false;
});

// ── UI UPDATE ────────────────────────────
function zoomToScale(z) {
  var s = {
    1:'1:500M', 2:'1:250M', 3:'1:150M', 4:'1:70M',  5:'1:35M',
    6:'1:15M',  7:'1:8M',   8:'1:4M',   9:'1:2M',   10:'1:1M',
    11:'1:500k',12:'1:250k',13:'1:150k',14:'1:70k',  15:'1:35k',
    16:'1:15k', 17:'1:8k',  18:'1:4k',  19:'1:2k'
  };
  return s[Math.round(z)] || ('Z' + z.toFixed(1));
}

function updateUI() {
  var z = mapHome.getZoom();
  document.getElementById('zoom-badge').textContent = 'Z: ' + z.toFixed(1);
  // Scales are now matched by ground metres-per-pixel, so both panels share
  // one honest value. Zoom NUMBERS may differ between panels by design.
  var s = zoomToScale(z);
  document.getElementById('home-scale').textContent   = s;
  document.getElementById('target-scale').textContent = s;
}

var _loaded = 0;
function onMapLoaded() {
  _loaded++;
  if (_loaded < 2) return;
  syncLock = true;
  matchScale(mapHome, mapTarget);   // start both panels at matching ground scale
  nominalZoom = mapHome.getZoom();
  syncLock = false;
  updateUI();
}
mapHome.on('load',    onMapLoaded);
mapTarget.on('load',  onMapLoaded);
mapHome.on('zoomend', updateUI);
mapTarget.on('zoomend', updateUI);

// ── STYLE SWITCHER ───────────────────────
document.querySelectorAll('.style-opt').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var style = btn.dataset.style;
    if (style === currentStyle) return;
    currentStyle = style;
    document.querySelectorAll('.style-opt').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    mapHome.setStyle(makeStyle(style));
    mapTarget.setStyle(makeStyle(style));
    mapHome.once('style.load', function() { mapHome.setProjection({ type: 'globe' }); });
    mapTarget.once('style.load', function() { mapTarget.setProjection({ type: 'globe' }); });
    if (style === 'terrain' && nominalZoom > 17) {
      nominalZoom = 17;
      mapHome.setZoom(17);
      mapTarget.setZoom(17);
      showStatus('home-status',   'Terrain max zoom Z:17');
      showStatus('target-status', 'Terrain max zoom Z:17');
    }
  });
});

// ── PANEL TOGGLES ────────────────────────
var PANELS = { style: 'style-panel', pins: 'pins-panel' };

function togglePanel(id, force) {
  var el   = document.getElementById(id);
  var open = (force !== undefined) ? force : !el.classList.contains('open');
  Object.keys(PANELS).forEach(function(k) {
    if (PANELS[k] !== id) document.getElementById(PANELS[k]).classList.remove('open');
  });
  el.classList.toggle('open', open);
}

document.getElementById('btn-pan').addEventListener('click', function() {
  panSyncActive = !panSyncActive;
  document.getElementById('btn-pan').classList.toggle('active', panSyncActive);
  if (panSyncActive) {
    var hc = mapHome.getCenter();
    var tc = mapTarget.getCenter();
    homePanBase   = { lat: hc.lat, lng: hc.lng };
    targetPanBase = { lat: tc.lat, lng: tc.lng };
  }
});

document.getElementById('btn-style').addEventListener('click', function() {
  var open = document.getElementById('style-panel').classList.contains('open');
  document.getElementById('btn-style').classList.toggle('active', !open);
  togglePanel('style-panel');
});

document.getElementById('btn-pins').addEventListener('click', function() {
  var open = document.getElementById('pins-panel').classList.contains('open');
  document.getElementById('btn-pins').classList.toggle('active', !open);
  togglePanel('pins-panel');
  renderPins();
});

// ── FULLSCREEN ───────────────────────────
var app    = document.getElementById('app');
var fsExit = document.getElementById('fs-exit');
var btnFS  = document.getElementById('btn-fs');

function enterFullscreen() {
  app.classList.add('fullscreen');
  btnFS.classList.add('active');
  setTimeout(function() { mapHome.resize(); mapTarget.resize(); }, 100);
  setTimeout(function() { mapHome.resize(); mapTarget.resize(); }, 400);
}

function exitFullscreen() {
  app.classList.remove('fullscreen');
  btnFS.classList.remove('active');
  setTimeout(function() { mapHome.resize(); mapTarget.resize(); }, 100);
}

btnFS.addEventListener('click', function() {
  if (app.classList.contains('fullscreen')) { exitFullscreen(); } else { enterFullscreen(); }
});
fsExit.addEventListener('click', exitFullscreen);
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement) exitFullscreen();
});

// ── PINS ─────────────────────────────────
var pins = JSON.parse(localStorage.getItem('sm_pins_v3') || '[]');

function savePins() {
  try { localStorage.setItem('sm_pins_v3', JSON.stringify(pins)); } catch(e) {}
}

function renderPins() {
  var list = document.getElementById('pins-list');
  list.innerHTML = '';
  if (!pins.length) {
    var empty = document.createElement('span');
    empty.style.cssText = 'font-size:10px;color:#888899;padding:0 6px;white-space:nowrap;font-family:"DM Mono",monospace;';
    empty.textContent = 'No saved locations';
    list.appendChild(empty);
    return;
  }
  pins.forEach(function(pin, i) {
    var chip = document.createElement('div');
    chip.className = 'pin-chip';
    chip.innerHTML = '<span class="pin-dot" style="background:' + (pin.panel === 'home' ? '#1a9e6e' : '#1a6eb5') + '"></span><span class="pin-label">' + pin.label + '</span><span class="pin-del">×</span>';
    chip.addEventListener('click', function(e) {
      if (e.target.classList.contains('pin-del')) { pins.splice(i, 1); savePins(); renderPins(); return; }
      var m = pin.panel === 'home' ? mapHome : mapTarget;
      m.flyTo({ center: [pin.lng, pin.lat], zoom: m.getZoom(), animate: true, duration: 800 });
      m.once('moveend', function() {
        var other = (m === mapHome) ? mapTarget : mapHome;
        syncLock = true; matchScale(other, m); nominalZoom = mapHome.getZoom(); syncLock = false; updateUI();
      });
      document.getElementById(pin.panel + '-input').value = pin.label;
    });
    list.appendChild(chip);
  });
}

function pinCurrentLocation(panelId) {
  var map = panelId === 'home' ? mapHome : mapTarget;
  var inp = document.getElementById(panelId + '-input');
  var label = (inp.value || 'Location').split(',')[0].trim().slice(0, 28);
  var c = map.getCenter();
  pins.push({ label: label, lat: c.lat, lng: c.lng, panel: panelId });
  savePins();
  renderPins();
  var btn = document.getElementById(panelId + '-pin-btn');
  btn.classList.add('pinned');
  setTimeout(function() { btn.classList.remove('pinned'); }, 1500);
}

document.getElementById('home-pin-btn').addEventListener('click',   function() { pinCurrentLocation('home'); });
document.getElementById('target-pin-btn').addEventListener('click', function() { pinCurrentLocation('target'); });
renderPins();

// ── STATUS TOAST ─────────────────────────
function showStatus(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 2500);
}

// ── GEOCODER ─────────────────────────────
async function photonSearch(q) {
  var r = await fetch('https://photon.komoot.io/api/?q=' + encodeURIComponent(q) + '&limit=5&lang=en');
  var d = await r.json();
  return d.features.map(function(f) {
    return {
      lat: f.geometry.coordinates[1],
      lon: f.geometry.coordinates[0],
      display_name: [f.properties.name, f.properties.city || f.properties.county, f.properties.state, f.properties.country].filter(Boolean).join(', ')
    };
  });
}

var dbT = {};

function setupSearch(inpId, btnId, acId, mapObj, statusId) {
  var inp = document.getElementById(inpId);
  var btn = document.getElementById(btnId);
  var ac  = document.getElementById(acId);

  function closeAC() { ac.innerHTML = ''; ac.classList.remove('open'); }

  function flyTo(item) {
    mapObj.flyTo({ center: [parseFloat(item.lon), parseFloat(item.lat)], zoom: mapObj.getZoom(), animate: true, duration: 900 });
    mapObj.once('moveend', function() {
      var other = (mapObj === mapHome) ? mapTarget : mapHome;
      syncLock = true; matchScale(other, mapObj); nominalZoom = mapHome.getZoom(); syncLock = false; updateUI();
    });
    inp.value = item.display_name.split(',').slice(0, 3).join(', ');
    closeAC();
  }

  async function doSearch(q) {
    if (!q.trim()) return;
    showStatus(statusId, 'Searching…');
    try {
      var res = await photonSearch(q);
      if (!res.length) { showStatus(statusId, 'No results'); return; }
      if (res.length === 1) { flyTo(res[0]); return; }
      ac.innerHTML = '';
      res.forEach(function(item) {
        var el = document.createElement('div');
        el.className = 'ac-item';
        el.textContent = item.display_name.split(',').slice(0, 4).join(', ');
        el.addEventListener('click', function() { flyTo(item); });
        ac.appendChild(el);
      });
      ac.classList.add('open');
    } catch(e) {
      showStatus(statusId, 'Error — check connection');
    }
  }

  inp.addEventListener('input', function() {
    clearTimeout(dbT[inpId]);
    if (inp.value.length < 3) { closeAC(); return; }
    dbT[inpId] = setTimeout(function() { doSearch(inp.value); }, 500);
  });

  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter')  { clearTimeout(dbT[inpId]); closeAC(); doSearch(inp.value); }
    if (e.key === 'Escape') { closeAC(); }
  });

  btn.addEventListener('click', function() { closeAC(); doSearch(inp.value); });

  document.addEventListener('click', function(e) {
    if (!ac.contains(e.target) && e.target !== inp) closeAC();
  });
}

setupSearch('home-input',   'home-btn',   'home-ac',   mapHome,   'home-status');
setupSearch('target-input', 'target-btn', 'target-ac', mapTarget, 'target-status');

window.addEventListener('resize', function() {
  setTimeout(function() { mapHome.resize(); mapTarget.resize(); }, 150);
});

</script>
